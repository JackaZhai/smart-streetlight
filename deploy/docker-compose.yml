services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: smart-streetlight-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      emqx:
        condition: service_started
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CORS_ORIGIN: "*"
      MQTT_URL: mqtt://emqx:1883
      STORAGE_DRIVER: mysql
      DATABASE_URL: mysql://streetlight:streetlight_pass@mysql:3306/smart_streetlight
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-delivery}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-86400}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: smart-streetlight-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-18080}:80"

  emqx:
    image: emqx/emqx:5
    container_name: smart-streetlight-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public

  mysql:
    image: mysql:8.4
    container_name: smart-streetlight-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: smart_streetlight
      MYSQL_USER: streetlight
      MYSQL_PASSWORD: streetlight_pass
      MYSQL_ROOT_PASSWORD: streetlight_root_pass
      TZ: Asia/Shanghai
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ustreetlight -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
